version: 2
before:
  hooks:
    - go mod download
builds:
  - id: leanproxy-mcp
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mmornati/leanproxy-mcp/cmd.versionString={{.Version}}
archives:
  - id: default
    format: tar.gz
    files: []
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: mmornati
    name: leanproxy-mcp
