name: BMad Stories Sync

on:
  push:
    paths:
      - '_bmad-output/implementation-artifacts/*.md'
  workflow_dispatch:
    inputs:
      sync_all:
        description: 'Sync all stories (ignore git history)'
        required: false
        default: 'false'
        type: boolean
  workflow_run:
    workflows: [BMad Epics Sync]
    types: [completed]
    branches: [main]

jobs:
  sync-stories:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Download epics mapping
        if: github.event.workflow_run != null
        uses: actions/download-artifact@v4
        with:
          name: issue-mapping
          path: _bmad-output/
        continue-on-error: true

      - name: Run BMad Stories sync
        run: python .github/scripts/bmad_stories_sync.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_ALL: ${{ inputs.sync_all }}
          EPICS_WORKFLOW_STATUS: ${{ github.event.workflow_run.conclusion }}