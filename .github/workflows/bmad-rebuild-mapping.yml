name: BMad Rebuild Mapping

on:
  workflow_dispatch:

jobs:
  rebuild-mapping:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Rebuild mapping
        run: python .github/scripts/bmad_rebuild_mapping.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push mapping changes
        run: |
          git config --local user.email "bmad-bot@github.com"
          git config --local user.name "BMad Bot"
          git add _bmad-output/.issue-mapping.json
          git diff --cached --quiet || git commit -m "BMad rebuild: synchronized issue mapping with GitHub"
          git push