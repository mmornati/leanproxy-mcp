name: BMad Sync

on:
  push:
    paths:
      - '_bmad-output/**/*.md'
  workflow_dispatch:
    inputs:
      sync_all:
        description: 'Sync all files (ignore git history)'
        required: false
        default: 'false'
        type: boolean

jobs:
  bmad-epics-stories-sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run BMad sync
        run: python .github/scripts/bmad_sync.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_ALL: ${{ inputs.sync_all }}