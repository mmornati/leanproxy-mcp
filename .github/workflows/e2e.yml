name: E2E Tests

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        run: |
          OS=${{ matrix.os }}
          EXT=""
          if [ "$OS" = "windows-latest" ]; then
            EXT=".exe"
          fi
          go build -ldflags="-s -w" -o leanproxy-mcp${EXT} .

      - name: Run E2E tests
        run: go test -v -tags=e2e -timeout 10m ./tests/e2e/...
        env:
          LEANPROXY_BINARY: ${{ runner.os }}-leanproxy-mcp

  integration:
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        run: go build -ldflags="-s -w" -o leanproxy-mcp .

      - name: Run integration tests
        run: |
          ./leanproxy-mcp --help
          ./leanproxy-mcp version
          ./leanproxy-mcp server list

      - name: Test configuration validation
        run: |
          echo 'servers: []' > /tmp/test-config.yaml
          LEANPROXY_CONFIG=/tmp/test-config.yaml ./leanproxy-mcp server list

  e2e-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        run: go build -ldflags="-s -w" -o leanproxy-mcp .

      - name: Run short E2E tests
        run: go test -v -short -timeout 2m ./tests/e2e/...