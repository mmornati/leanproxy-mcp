run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - prealloc
    - gosec

linters-settings:
  gofmt:
    simplify: true
  misspell:
    locale: US
  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosimple
        - staticcheck
        - ineffassign
        - gosec
    - path: cmd/completion\.go
      linters:
        - errcheck
    - path: cmd/migrate\.go
      linters:
        - errcheck
    - path: cmd/server\.go
      linters:
        - errcheck
    - path: cmd/root\.go
      linters:
        - unused
    - path: cmd/compactor_test\.go
      linters:
        - unused
    - path: cmd/report\.go
      linters:
        - gosimple
    - path: pkg/proxy/socket/server\.go
      linters:
        - errcheck
    - path: pkg/migrate/vscode\.go
      linters:
        - errcheck
        - unused
    - path: pkg/pool/pool\.go
      linters:
        - errcheck
    - path: pkg/pool/server\.go
      linters:
        - errcheck
        - unused
        - staticcheck
    - path: pkg/bouncer/redactor\.go
      linters:
        - unused
        - ineffassign
    - path: pkg/bouncer/streaming\.go
      linters:
        - unused
    - path: pkg/compactor/cache\.go
      linters:
        - unused
    - path: pkg/migrate/scanner\.go
      linters:
        - unused
    - path: pkg/pool/health\.go
      linters:
        - unused
    - path: pkg/pool/pool\.go
      linters:
        - unused
    - path: pkg/pool/queue\.go
      linters:
        - unused
    - path: pkg/concurrent/batch\.go
      linters:
        - unused
    - path: pkg/concurrent/circuit\.go
      linters:
        - unused
    - path: pkg/concurrent/ratelimit\.go
      linters:
        - unused
    - path: pkg/proxy/health_monitor\.go
      linters:
        - unused
    - path: pkg/registry/cache\.go
      linters:
        - errcheck
    - path: cmd/serve\.go
      linters:
        - errcheck
    - path: pkg/mcp/handlers\.go
      linters:
        - errcheck
        - unused
    - path: pkg/bouncer/allowlist\.go
      linters:
        - gosec
    - path: pkg/bouncer/safe_pattern\.go
      linters:
        - gosec
    - path: pkg/bouncer/boilerplate\.go
      linters:
        - gosec
    - path: pkg/proxy/socket/
      linters:
        - gosec
    - path: pkg/utils/
      linters:
        - gosec
    - path: pkg/concurrent/circuit\.go
      linters:
        - gosec
    - path: pkg/proxy/process_health\.go
      linters:
        - gosec
    - path: pkg/registry/lifecycle\.go
      linters:
        - gosec
    - path: pkg/statusfile/file\.go
      linters:
        - prealloc
    - path: pkg/pool/server\.go
      linters:
        - gosec
    - path: pkg/migrate/
      linters:
        - prealloc
    - path: pkg/mcp/handlers_test\.go
      linters:
        - prealloc